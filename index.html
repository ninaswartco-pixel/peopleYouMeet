<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The People You Meet | Carla Schultz</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&family=Dancing+Script:wght@700&family=Great+Vibes&family=Italiana&family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@200;300;400;500&family=Crimson+Text:wght@400;600&family=Lora:wght@400;500;600&family=Merriweather:wght@300;400;700&family=Old+Standard+TT:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Satisfy&family=Caveat:wght@400;600&family=Abril+Fatface&family=Cinzel:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#13c8ec",
              "background-dark": "#101f22",
            },
            fontFamily: {
              display: "Manrope",
              script: ["Dancing Script", "cursive"],
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      :root {
        --burnt-orange-transparent: rgba(184, 84, 11, 0.6);
      }
      body {
        font-family: "Manrope", sans-serif;
        background-color: #000;
      }
      .accent-text {
        color: var(--burnt-orange-transparent) !important;
        transition: none !important;
      }
      .secret-author {
        color: var(--burnt-orange-transparent) !important;
        transition: none !important;
        text-decoration: none !important;
      }
      .secret-author:hover {
        color: var(--burnt-orange-transparent) !important;
        opacity: 1 !important;
        cursor: default;
        text-decoration: none !important;
      }
      .hero-bg {
        background-size: cover;
        background-position: center;
      }
      .loading-content {
        opacity: 0;
        transition: opacity 0.3s ease-in;
      }
      .content-loaded {
        opacity: 1;
      }
      .fancy-entries-link {
        background: none;
        box-shadow: 0 2px 16px 0 rgba(184, 84, 11, 0.08);
        transition:
          border-color 0.2s,
          color 0.2s,
          box-shadow 0.2s,
          width 0.2s;
        min-width: 10rem;
        display: inline-block;
        text-align: center;
      }
      .fancy-entries-link:hover {
        border-bottom: 2px solid #fff;
        color: #fff;
        box-shadow: 0 4px 24px 0 rgba(184, 84, 11, 0.18);
        min-width: 12rem;
      }
      .fancy-entries-link:active {
        border-bottom: 2px solid #fff;
        color: #fff;
        box-shadow: 0 6px 32px 0 rgba(184, 84, 11, 0.32);
        min-width: 12rem;
      }
    </style>
    <style>
      input:-webkit-autofill,
      input:-webkit-autofill:focus,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 1000px rgba(15, 15, 18, 0.95) inset !important;
        box-shadow: 0 0 0 1000px rgba(15, 15, 18, 0.95) inset !important;
        background-color: rgba(15, 15, 18, 0.95) !important;
        color: rgba(255, 255, 255, 0.85) !important;
        -webkit-text-fill-color: rgba(255, 255, 255, 0.85) !important;
        caret-color: rgba(255, 255, 255, 0.85) !important;
      }
    </style>
  </head>
  <body class="text-white overflow-hidden">
    <!-- Loading Spinner -->
    <style>
      @keyframes typewriter-cursor {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes float-heart {
        0% { transform: translateY(0) scale(1); opacity: 0.7; }
        50% { transform: translateY(-12px) scale(1.1); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 0.7; }
      }
      @keyframes loading-dots {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
      }
      .loading-dot-anim::after {
        content: '';
        animation: loading-dots 1.5s steps(1) infinite;
      }
      .float-heart { animation: float-heart 2s ease-in-out infinite; }
      .float-heart:nth-child(2) { animation-delay: 0.4s; }
      .float-heart:nth-child(3) { animation-delay: 0.8s; }
    </style>
    <div
      id="loading-spinner"
      class="fixed inset-0 bg-[#f5e8d6] flex flex-col items-center justify-center z-50 gap-5"
    >
      <!-- Typewriter Icon -->
      <div class="relative flex flex-col items-center">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Paper -->
          <rect x="18" y="6" width="28" height="24" rx="2" fill="#fff" stroke="rgba(184,84,11,0.5)" stroke-width="1.5"/>
          <!-- Paper lines -->
          <line x1="23" y1="14" x2="41" y2="14" stroke="rgba(184,84,11,0.25)" stroke-width="1"/>
          <line x1="23" y1="18" x2="38" y2="18" stroke="rgba(184,84,11,0.25)" stroke-width="1"/>
          <line x1="23" y1="22" x2="35" y2="22" stroke="rgba(184,84,11,0.25)" stroke-width="1"/>
          <!-- Cursor blinking on paper -->
          <rect x="23" y="26" width="8" height="1.5" rx="0.5" fill="rgba(184,84,11,0.6)">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
          </rect>
          <!-- Typewriter body -->
          <rect x="10" y="30" width="44" height="18" rx="4" fill="rgba(184,84,11,0.15)" stroke="rgba(184,84,11,0.4)" stroke-width="1.5"/>
          <!-- Keys row 1 -->
          <rect x="16" y="34" width="5" height="4" rx="1" fill="rgba(184,84,11,0.25)"/>
          <rect x="23" y="34" width="5" height="4" rx="1" fill="rgba(184,84,11,0.25)"/>
          <rect x="30" y="34" width="5" height="4" rx="1" fill="rgba(184,84,11,0.25)"/>
          <rect x="37" y="34" width="5" height="4" rx="1" fill="rgba(184,84,11,0.25)"/>
          <rect x="44" y="34" width="5" height="4" rx="1" fill="rgba(184,84,11,0.25)"/>
          <!-- Keys row 2 -->
          <rect x="18" y="40" width="5" height="4" rx="1" fill="rgba(184,84,11,0.2)"/>
          <rect x="25" y="40" width="5" height="4" rx="1" fill="rgba(184,84,11,0.2)"/>
          <rect x="32" y="40" width="5" height="4" rx="1" fill="rgba(184,84,11,0.2)"/>
          <rect x="39" y="40" width="5" height="4" rx="1" fill="rgba(184,84,11,0.2)"/>
          <!-- Platen knob -->
          <circle cx="12" cy="32" r="2.5" fill="rgba(184,84,11,0.3)" stroke="rgba(184,84,11,0.5)" stroke-width="1"/>
          <circle cx="52" cy="32" r="2.5" fill="rgba(184,84,11,0.3)" stroke="rgba(184,84,11,0.5)" stroke-width="1"/>
        </svg>
        <!-- Floating hearts -->
        <div class="absolute -top-2 left-0 flex gap-3">
          <span class="float-heart text-lg" style="color: rgba(184,84,11,0.45);">&hearts;</span>
          <span class="float-heart text-sm" style="color: rgba(184,84,11,0.3);">&hearts;</span>
          <span class="float-heart text-xs" style="color: rgba(184,84,11,0.35);">&hearts;</span>
        </div>
      </div>
      <!-- Loading text -->
      <span
        class="loading-dot-anim tracking-[0.3em] uppercase text-xs font-light"
        style="color: rgba(184,84,11,0.6); font-family: 'Montserrat', sans-serif;"
      >loading</span>
    </div>
    <main
      class="loading-content relative h-screen w-full flex items-center justify-center overflow-hidden"
    >
      <div class="absolute inset-0 hero-bg">
        <div class="absolute inset-0 bg-black/20"></div>
      </div>
      <div class="relative z-10 w-full max-w-6xl px-6">
        <div class="text-center flex flex-col items-center gap-4">
          <div class="space-y-1">
            <h1
              class="text-6xl md:text-8xl font-script leading-tight drop-shadow-2xl select-none"
              style="
                color: rgba(255, 255, 255, 0.75);
                word-break: keep-all;
                hyphens: none;
                min-height: 1.2em;
                text-shadow: 2px 4px 12px rgba(44, 24, 8, 0.25);
              "
            ></h1>
            <div class="flex items-center justify-center">
              <a
                id="openLoginLink"
                class="secret-author font-display text-lg md:text-xl tracking-[0.1em] select-none"
                href="#"
              >
              </a>
            </div>
          </div>
          <div class="mt-12">
            <a
              class="group flex flex-col items-center gap-3"
              href="entries.html"
            >
              <span
                class="fancy-entries-link text-white text-sm font-light tracking-[0.4em] lowercase border-b border-white/40 pb-2 px-4 rounded-lg transition-all duration-200 cursor-pointer"
                style="position: relative; z-index: 1"
              >
                read entries
              </span>
            </a>
          </div>
        </div>
      </div>
      <div
        class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-3 opacity-40"
      >
        <div class="w-px h-16 bg-gradient-to-b from-white to-transparent"></div>
      </div>
    </main>
    <div
      class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-6 opacity-0 pointer-events-none transition-opacity duration-300"
    >
      <div
        class="relative w-full max-w-3xl bg-[#101f22]/60 backdrop-blur-xl border border-white/10 rounded-xl overflow-hidden shadow-2xl"
      >
        <div class="grid md:grid-cols-2">
          <div
            class="h-64 md:h-auto bg-cover bg-center"
            style="
              background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCflFUXmcHkQwD03NtcqbQLEx2Sme89yaY6beQU3B6cVSbypE3KTRUdbDoaMpBwa5ie7L5xfDH1qi9keBTXi9rBFEHObDvNaSjl6BEDBk2JcDRdjR5ed5wtFu1aRxUl4ljP5LLr62hF5j_o9v9VRXA2Jen1XMEhrk05KRJaqBy_8TAIZIWp1EVZjO48WQjq03f7z7FjSBrfz8OgesBylB7QF7ZAUjlbuWhKij_KvvHUAOqCOUuxlYGX9F4GKg-rffs1Y2AgOqa8RnE&quot;);
            "
          ></div>
          <div class="p-8 md:p-12 flex flex-col justify-center gap-6">
            <div class="space-y-2">
              <h2
                class="text-xs font-bold tracking-[0.2em] uppercase text-white/50"
              >
                The Author
              </h2>
              <h3
                class="accent-text text-3xl font-bold font-display tracking-tight"
              >
                Carla Schultz
              </h3>
            </div>
            <p class="text-white/70 text-base leading-relaxed font-light">
              Carla is a storyteller capturing the quiet moments between
              strangers. This blog is her digital scrapbook of human resonance.
            </p>
            <div class="flex flex-wrap gap-4 pt-4">
              <button
                class="flex items-center justify-center rounded-lg h-10 px-6 bg-white text-black text-sm font-bold tracking-wide"
              >
                Follow Stories
              </button>
            </div>
          </div>
        </div>
        <button
          class="absolute top-4 right-4 size-10 flex items-center justify-center rounded-full bg-black/20 text-white hover:bg-white hover:text-black transition-all"
        >
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
    </div>
    <script type="module">
      import { db } from "./js/firebase-init.js";
      import {
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

      async function loadGlobalSettings() {
        try {
          const docRef = doc(db, "siteSettings", "global");
          const snap = await getDoc(docRef);
          if (snap.exists()) {
            const data = snap.data();

            if (data.siteTitle) {
              document.title =
                data.siteTitle + " | " + (data.siteAuthor || "Carla Schultz");
              const titleEl = document.querySelector("h1");
              if (titleEl) {
                typewriterEffect(titleEl, data.siteTitle, 120);
              }
            }

            if (data.siteAuthor) {
              const authorEl = document.querySelector(".secret-author");
              if (authorEl) {
                authorEl.textContent = data.siteAuthor;
              }
            }

            if (data.heroImageUrl) {
              const heroBg = document.querySelector(".hero-bg");
              if (heroBg) {
                const img = new Image();
                img.onload = () => {
                  heroBg.style.backgroundImage =
                    "url(" + data.heroImageUrl + ")";
                  showContent();
                };
                img.onerror = () => {
                  console.error("Failed to load hero image");
                  showContent();
                };
                img.src = data.heroImageUrl;
              } else {
                showContent();
              }
            } else {
              showContent();
            }

            if (data.themeColor) {
              document.documentElement.style.setProperty(
                "--burnt-orange-transparent",
                data.themeColor + "99",
              );
            }

            const fontMap = {
              greatVibes: '"Great Vibes", cursive',
              italiana: '"Italiana", serif',
              playfair: '"Playfair Display", serif',
              cormorant: '"Cormorant Garamond", serif',
              montserrat: '"Montserrat", sans-serif',
              crimsonText: '"Crimson Text", serif',
              lora: '"Lora", serif',
              merriweather: '"Merriweather", serif',
              oldStandard: '"Old Standard TT", serif',
              libreBaskerville: '"Libre Baskerville", serif',
              dancingScript: '"Dancing Script", cursive',
              satisfy: '"Satisfy", cursive',
              caveat: '"Caveat", cursive',
              abrilFatface: '"Abril Fatface", serif',
              cinzel: '"Cinzel", serif',
            };

            if (data.titleFont) {
              const titleFontFamily =
                fontMap[data.titleFont] || fontMap.greatVibes;
              const titleEl = document.querySelector("h1");
              if (titleEl) titleEl.style.fontFamily = titleFontFamily;
            }

            if (data.authorFont) {
              const authorFontFamily =
                fontMap[data.authorFont] || fontMap.italiana;
              const authorEl = document.querySelector(".secret-author");
              if (authorEl) authorEl.style.fontFamily = authorFontFamily;
            }

            if (data.bodyFont) {
              const bodyFontFamily =
                fontMap[data.bodyFont] || fontMap.montserrat;
              document.body.style.fontFamily = bodyFontFamily;
            }
          } else {
            showContent();
          }
        } catch (e) {
          console.error("Failed to load global settings:", e);
          showContent();
        }
      }

      function typewriterEffect(element, text, speed = 80) {
        if (!element || !text) return Promise.resolve();

        return new Promise((resolve) => {
          let i = 0;
          element.innerHTML = "";

          const formattedText = text.replace(
            /\s+(along the way)/gi,
            '</span><br><span style="white-space: nowrap; display: inline-block;">$1',
          );
          const wrappedText =
            '<span style="white-space: nowrap; display: inline-block;">' +
            formattedText +
            "</span>";

          function type() {
            if (i < wrappedText.length) {
              if (wrappedText.charAt(i) === "<") {
                const closingTag = wrappedText.indexOf(">", i);
                if (closingTag !== -1) {
                  element.innerHTML += wrappedText.substring(i, closingTag + 1);
                  i = closingTag + 1;
                  setTimeout(type, 0);
                  return;
                }
              }
              element.innerHTML += wrappedText.charAt(i);
              i++;
              setTimeout(type, speed);
            } else {
              resolve();
            }
          }

          type();
        });
      }

      function showContent() {
        const spinner = document.getElementById("loading-spinner");
        const main = document.querySelector("main");

        if (spinner) {
          spinner.style.display = "none";
        }
        if (main) {
          main.classList.remove("loading-content");
          main.classList.add("content-loaded");
        }
      }

      loadGlobalSettings();
    </script>
    <style>
      #login-modal .login-panel {
        background: rgba(10, 10, 12, 0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      #login-modal .login-input {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.85);
        transition: border-color 0.3s, background 0.3s;
      }
      #login-modal .login-input::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }
      #login-modal .login-input:focus {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.2);
        outline: none;
        box-shadow: none;
      }
      #login-modal .login-submit {
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.25em;
        transition: color 0.3s, letter-spacing 0.3s;
      }
      #login-modal .login-submit:hover {
        color: rgba(255, 255, 255, 0.9);
        letter-spacing: 0.35em;
      }
    </style>
    <div
      id="login-modal"
      class="hidden fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 transition-opacity duration-300"
    >
      <div
        class="login-panel relative w-full max-w-sm rounded-2xl shadow-2xl p-10 flex flex-col gap-6"
      >
        <button
          id="login-modal-close"
          type="button"
          class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full text-white/20 hover:text-white/60 transition-colors focus:outline-none"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>

        <div class="text-center space-y-2 pt-2">
          <div class="flex justify-center mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
          </div>
          <h2 class="text-sm font-light tracking-[0.3em] uppercase text-white/40" style="font-family: 'Montserrat', sans-serif;">
            The Secret Room
          </h2>
          <p class="text-[11px] text-white/20 font-light" style="font-family: 'Montserrat', sans-serif;">
            Reserved for the author
          </p>
        </div>

        <form id="login-form" class="flex flex-col gap-4">
          <input
            id="login-email"
            type="email"
            placeholder="Secret word"
            autocomplete="username"
            required
            class="login-input w-full px-4 py-3 rounded-lg text-sm"
            style="font-family: 'Montserrat', sans-serif;"
          />
          <input
            id="login-password"
            type="password"
            placeholder="Writing key"
            autocomplete="current-password"
            required
            class="login-input w-full px-4 py-3 rounded-lg text-sm"
            style="font-family: 'Montserrat', sans-serif;"
          />
          <button
            type="submit"
            class="login-submit mt-2 py-3 text-[10px] uppercase font-medium tracking-[0.25em] bg-transparent border-none"
            style="font-family: 'Montserrat', sans-serif;"
          >
            Enter
          </button>
        </form>
        <div
          id="login-message"
          class="text-center text-xs font-light text-white/40"
          style="font-family: 'Montserrat', sans-serif; min-height: 1.5em;"
        ></div>
      </div>
    </div>
    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/login-modal.js"></script>
    <script src="js/scripts.js"></script>
  </body>
</html>
